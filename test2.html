<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 기사 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Sans+KR:wght@400;700&display=swap');
        .news-font { font-family: 'Song+Myung', serif; }
    </style>
</head>
<body class="bg-gray-100 p-10">

    <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4">기사 작성</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">제목</label>
                    <input type="text" id="inputTitle" placeholder="제목을 입력하세요" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">내용</label>
                    <textarea id="inputContent" rows="10" placeholder="기사 내용을 입력하세요" class="w-full p-2 border rounded"></textarea>
                </div>
                <button onclick="saveAsImage()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                    이미지로 저장하기
                </button>
            </div>
        </div>

        <div id="articleArea" class="w-full md:w-2/3 bg-white p-12 shadow-2xl border-t-8 border-black">
            <div class="mb-4 border-b-2 border-gray-800 pb-2 flex justify-between items-end">
                <span class="text-2xl font-black tracking-tighter">DAILY NEWS</span>
                <span class="text-sm text-gray-500" id="currentDate">2026. 04. 19</span>
            </div>
            
            <h1 id="displayTitle" class="news-font text-4xl font-bold mb-6 leading-tight">제목을 입력하면 여기에 나타납니다</h1>
            
            <div class="flex gap-6">
                <div class="flex-1">
                    <p id="displayContent" class="text-gray-800 leading-relaxed text-justify whitespace-pre-line border-l-2 border-gray-100 pl-4">
                        왼쪽 입력란에 내용을 작성해 보세요. 실제 신문 기사처럼 정렬되어 출력됩니다.
                    </p>
                </div>
            </div>
            
            <div class="mt-8 pt-4 border-t border-gray-200 text-right text-xs text-gray-400">
                ⓒ 2026 Daily News All Rights Reserved.
            </div>
        </div>
    </div>

    <script>
        // 실시간 미리보기 기능
        const inputTitle = document.getElementById('inputTitle');
        const inputContent = document.getElementById('inputContent');
        const displayTitle = document.getElementById('displayTitle');
        const displayContent = document.getElementById('displayContent');

        inputTitle.addEventListener('input', (e) => {
            displayTitle.innerText = e.target.value || "제목을 입력하세요";
        });

        inputContent.addEventListener('input', (e) => {
            displayContent.innerText = e.target.value || "내용을 입력하세요";
        });

        // 이미지 저장 함수
        function saveAsImage() {
            const article = document.getElementById('articleArea');
            html2canvas(article).then(canvas => {
                const link = document.createElement('a');
                link.download = 'news-article.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // 오늘 날짜 설정
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ko-KR', {
            year: 'numeric', month: 'long', day: 'numeric'
        });
    </script>
</body>
</html>
