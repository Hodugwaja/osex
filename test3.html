<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스 기사 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-gray-100 p-10">

    <div class="main-page">
        
        <div class="w-full md:w-1/3 bg-white p-6 rounded-lg shadow-md h-fit">
            <h2 class="text-xl font-bold mb-4">기사 작성</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">제목</label>
                    <input type="text" id="inputTitle" placeholder="제목을 입력하세요" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">내용</label>
                    <textarea id="inputContent" rows="10" placeholder="기사 내용을 입력하세요" class="w-full p-2 border rounded"></textarea>
                </div>
                <button onclick="saveAsImage()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                    이미지로 저장하기
                </button>
            </div>
        </div>

        <div id="articleArea" class="bg-white p-12 shadow-2xl border-t-8 border-black">
            <div class="article-header-logo">
                <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white text-xs font-bold">M</div>
                <span class="media-name">마이데일리</span>
            </div>

            <h1 id="displayTitle" class="article-title">
                제목을 입력하세요. 스포츠 기사처럼 굵고 직관적으로 표시됩니다.
            </h1>

            <div class="article-info">
                <div class="author-info">
                    <span class="author-name">카리대 기자</span>
                </div>
                <div id="currentDate" class="article-date">2026.04.25. 오후 09:48</div>
            </div>

            <div id="displayContent" class="article-body">
                여기에 기사 본문 내용이 들어갑니다. 스포츠 뉴스의 가독성을 위해 자간과 행간을 최적화했습니다.
            </div>

            <div class="mt-12 text-xs text-gray-400">
                Copyright ⓒOSEX. 이 기사는 실제 기사가 아닌 가짜 기사입니다.
            </div>
        </div>
    </div>
    <script>
         // 실시간 미리보기 기능
        const inputTitle = document.getElementById('inputTitle');
        const inputContent = document.getElementById('inputContent');
        const displayTitle = document.getElementById('displayTitle');
        const displayContent = document.getElementById('displayContent');

        inputTitle.addEventListener('input', (e) => {
            displayTitle.innerText = e.target.value || "제목을 입력하세요";
        });

        inputContent.addEventListener('input', (e) => {
            displayContent.innerText = e.target.value || "내용을 입력하세요";
        });

        // 이미지 저장 함수
        function saveAsImage() {
            const article = document.getElementById('articleArea');
            html2canvas(article).then(canvas => {
                const link = document.createElement('a');
                link.download = 'news-article.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // 오늘 날짜 설정
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ko-KR', {
            year: 'numeric', month: 'long', day: 'numeric'
        });
    </script>"
</body>
</html>
